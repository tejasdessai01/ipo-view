<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPO Watch India — Content Manager</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: "github",
          repo: "tejasdessai01/ipo-view",
          branch: "main"
        },
        media_folder: "public/images/blog",
        public_folder: "/images/blog",
        collections: [
          {
            name: "blog",
            label: "Blog Posts",
            folder: "content/blog",
            create: true,
            slug: "{{slug}}",
            fields: [
              { label: "Title", name: "title", widget: "string" },
              { label: "Publish Date", name: "date", widget: "datetime" },
              { label: "Description", name: "description", widget: "text", hint: "SEO meta description (150-160 chars)" },
              { label: "Cover Image", name: "cover", widget: "image", required: false },
              { label: "Tags", name: "tags", widget: "list", default: ["IPO"], hint: "Comma-separated tags" },
              { label: "Body", name: "body", widget: "markdown" }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
